<!DOCTYPE html>
<html>
<head>
    <title>Scratch Ticket</title>
    <style>
        body {
            background: #1e1e1e;
            color: white;
            text-align: center;
            font-family: Arial;
            margin-top: 50px;
        }

        canvas {
            margin-top: 20px;
            border-radius: 10px;
            cursor: crosshair;
        }

        #result {
            margin-top: 20px;
            font-size: 32px;
            font-weight: bold;
        }

        #footer {
            margin-top: 40px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>

<h1>Scratch Ticket ($500)</h1>

<canvas id="canvas" width="300" height="150"></canvas>

<div id="result"></div>

<div id="footer">
    Provided by "Woolie's Gas Station"
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");


// =======================
// 🎟️ TICKET SYSTEM
// =======================
function getTicketId() {
    let params = new URLSearchParams(window.location.search);
    let id = params.get("ticket");

    // if no ticket, generate one and update URL
    if (!id) {
        id = Math.random().toString(36).substring(2, 10).toUpperCase();
        window.location.search = "?ticket=" + id;
    }

    return id;
}

const ticketId = getTicketId();


// =======================
// 🔢 DETERMINISTIC RANDOM
// =======================
function seededRandom(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = (hash * 31 + str.charCodeAt(i)) % 1000000;
    }
    return (hash % 100) / 100;
}


// =======================
// 💰 RESULT (BASED ON TICKET)
// =======================
let roll = seededRandom(ticketId) * 100;
let winnings = 0;

if (roll < 60) winnings = 0;
else if (roll < 80) winnings = 1000;
else if (roll < 92) winnings = 2500;
else winnings = 5000;

let resultText = winnings > 0 ? "+$" + winnings : "YOU LOST";


// =======================
// 🔊 SOUNDS
// =======================
function playWinSound() {
    new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

function playLoseSound() {
    new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg").play();
}


// =======================
// 🎨 DRAW PRIZE
// =======================
function drawPrize() {
    ctx.globalCompositeOperation = "source-over";

    ctx.fillStyle = "#222";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = winnings > 0 ? "lime" : "red";
    ctx.font = "bold 40px Arial";
    ctx.textAlign = "center";
    ctx.fillText(resultText, canvas.width / 2, canvas.height / 2 + 10);
}


// =======================
// 🪙 DRAW COVER
// =======================
function drawCover() {
    ctx.globalCompositeOperation = "source-over";

    ctx.fillStyle = "gray";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.textAlign = "center";
    ctx.fillText("Scratch Here", canvas.width / 2, canvas.height / 2);
}

drawPrize();
drawCover();


// =======================
// ✏️ SCRATCH SYSTEM
// =======================
let isDrawing = false;
let scratched = 0;
let total = 0;
let revealed = false;

const gridSize = 10;
const grid = [];

for (let x = 0; x < canvas.width; x += gridSize) {
    for (let y = 0; y < canvas.height; y += gridSize) {
        grid.push({x, y, scratched: false});
        total++;
    }
}

canvas.addEventListener("mousedown", () => isDrawing = true);
canvas.addEventListener("mouseup", () => isDrawing = false);
canvas.addEventListener("mouseleave", () => isDrawing = false);

canvas.addEventListener("mousemove", (e) => {
    if (!isDrawing || revealed) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    ctx.globalCompositeOperation = "destination-out";
    ctx.beginPath();
    ctx.arc(x, y, 25, 0, Math.PI * 2);
    ctx.fill();

    grid.forEach(cell => {
        if (!cell.scratched) {
            const dx = cell.x - x;
            const dy = cell.y - y;
            if (dx * dx + dy * dy < 25 * 25) {
                cell.scratched = true;
                scratched++;
            }
        }
    });

    checkReveal();
});


// =======================
// 🎯 REVEAL LOGIC
// =======================
function checkReveal() {
    if (revealed) return;

    if (scratched / total > 0.5) {
        revealed = true;

        ctx.globalCompositeOperation = "destination-out";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawPrize();

        const resultDiv = document.getElementById("result");

        if (winnings > 0) {
            resultDiv.innerText = `Ticket ${ticketId}: You won $${winnings}!`;
            playWinSound();
        } else {
            resultDiv.innerText = `Ticket ${ticketId}: You lost`;
            playLoseSound();
        }

        isDrawing = false;
    }
}
</script>

</body>
</html>
